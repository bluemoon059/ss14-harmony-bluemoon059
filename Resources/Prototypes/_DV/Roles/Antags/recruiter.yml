- type: antag
  id: Recruiter
  name: roles-antag-syndicate-recruiter-name
  objective: roles-antag-syndicate-recruiter-objective
  antagonist: false # you ask questions and write papers not kill people
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # Matches LPO playtime. Reduced from original PR of 24hours to match with harmony's reduced hours.

- type: startingGear
  id: SyndicateRecruiterGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitSyndicateBusinessSuitHarmony #Harmony Changes, uses our unique business suit
    back: ClothingBackpackSatchel
    head: ClothingHeadHatFedoraBrown
    eyes: ClothingEyesGlassesSunglasses
    gloves: ClothingHandsGlovesColorWhite
    outerClothing: ClothingOuterCybersunOvercoat
    shoes: ClothingShoesLeather
    id: PassengerPDA
    ears: ClothingHeadsetGrey
    pocket1: PenRecruiter
    pocket2: RubberStampSyndicate
    belt: ClothingBeltSyndicateUtility
  inhand:
  - RecruiterBriefcase
